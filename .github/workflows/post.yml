name: post-messages

# Triggers:
#   - any push to main/master that touches messages/** (the typical case:
#     the browser client just committed a new message)
#   - manual workflow_dispatch (used to retry partial failures)
#
# The job re-commits messages/ with the [skip ci] tag so its own commits
# do not trigger the workflow again.

on:
  push:
    branches: [main, master]
    paths:
      - 'messages/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snarkysyndo-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Post pending messages
        env:
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: uv run action/post_messages.py

      - name: Commit status updates
        run: |
          if [ -z "$(git status --porcelain messages/)" ]; then
            echo "no status updates to commit"
            exit 0
          fi
          git config user.name "snarkysyndo-bot"
          git config user.email "snarkysyndo-bot@users.noreply.github.com"
          git add messages/
          git commit -m "Update post status [skip ci]"
          # AIDEV-NOTE: external pushes (a new compose) may land between
          # the run start and now. Posts already happened at that point,
          # so we MUST get the status commit through — otherwise the next
          # run sees the message as pending and double-posts. Rebase and
          # retry rather than failing.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed; fetching and rebasing"
            git fetch origin "$GITHUB_REF_NAME"
            git pull --rebase --autostash origin "$GITHUB_REF_NAME"
            sleep $((attempt * 2))
          done
          echo "ERROR: failed to push status updates after 5 attempts" >&2
          exit 1
